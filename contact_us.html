<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width">
        <link rel="stylesheet" href="styles/contact_styles.css">
        <link rel="stylesheet" href="styles/generic_styles.css">

        <title> Contact Us </title>
    </head>
    <body>
        <header>
            <h1> Contact Us </h1> 
            <!-- <img src=" " class="logo"> -->
        </header>
        <nav class="sitenavigation">
            <p><a href="index.html">Home</a></p>
            <p><a href="members.html">Members</a></p>
        </nav>
        <main class="content">
            <form action="/submit-contact" method="post">
                <div>
                    <p>Email address</p>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                    >
                </div>
                <div>
                    <p>Comments</p>
                    <textarea
                        id="comments"
                        name="comments"
                        rows="5"
                        placeholder="Write your message here..."
                        required></textarea>
                </div>
                <button type="submit">Send</button>
            </form>
        </main>
        <footer>
            <p> </p>
        </footer>
    </body>
</html>
